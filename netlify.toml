[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  conditions = {Role = ["public"]}
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
